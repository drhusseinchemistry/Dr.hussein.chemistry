<!DOCTYPE html>
<html lang="ku" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#4f46e5" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="پرسیاریێن کیمیایێ" />
    <link rel="apple-touch-icon" href="/chem-291.jpg" />
    <link rel="manifest" href="/manifest.json" />
    <title>پرسیاریێن کیمیایێ</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/index.css">
  </head>
  <body>
    <div id="root">
      <div id="loading-state" style="display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; gap: 10px;">
        <div style="font-size: 24px; font-weight: bold; color: #4f46e5;">...Loading</div>
        <div id="error-display" style="color: #ef4444; font-size: 14px; max-width: 80%; text-align: center;"></div>
      </div>
    </div>
    <script>
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        const display = document.getElementById('error-display');
        if (display) {
          display.innerHTML = 'Error: ' + msg + '<br><small>' + url + ':' + lineNo + '</small>';
        }
        return false;
      };
      window.addEventListener('unhandledrejection', function(event) {
        const display = document.getElementById('error-display');
        if (display) {
          display.innerHTML = 'Promise Error: ' + event.reason;
        }
      });
    </script>
    <script type="module" src="/index.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('SW registered'))
            .catch(err => console.error('SW error', err));
        });
      }
    </script>
  </body>
</html>
